// Domain value objects for Apps namespace
syntax = "proto3";

import "acme/common/v1/values.proto";
package acme.oms.v1;

message Order {
  string order_id = 1;
  repeated Item items = 2;
  acme.common.v1.Address shipping_address = 3;
  optional acme.common.v1.Shipment selected_shipment = 4;
}
message Payment {
  string rrn = 1;
  acme.common.v1.Money amount = 2;
}

message Item {
  string item_id = 1;
  int32 quantity = 2;
}
