// Domain value objects for Apps namespace
syntax = "proto3";

import "acme/common/v1/values.proto";
package acme.oms.v1;

message Order {
  string order_id = 1;
  repeated Item items = 2;
  ShippingAddress shipping_address = 3;
}
message Payment {
  string rrn = 1;
  acme.common.v1.Money amount = 2;
}

message Item {
  string item_id = 1;
  int32 quantity = 2;
}

message ShippingAddress {
  string street = 1;
  string city = 2;
  string state = 3;
  string postal_code = 4;
  string country = 5;
}