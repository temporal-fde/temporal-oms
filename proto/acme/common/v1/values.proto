// Shared value objects across all bounded contexts
syntax = "proto3";

package acme.common.v1;

import "google/protobuf/timestamp.proto";

message Money {
  string currency = 1;   // ISO 4217 currency code (USD, EUR, JPY, etc.)
  int64 units = 2;       // Amount in minor units (ISO 4217 exponent)
}

// EasyPostAddress holds the EasyPost-specific fields populated after address verification.
// The id is used downstream to create EasyPost Shipments without re-verifying.
message EasyPostAddress {
  string id = 1;        // EasyPost address ID
  bool residential = 2; // affects carrier rate selection
  bool verified = 3;
  optional Coordinate coordinate = 4; // lat/lng from EasyPost verification; required by get_location_events
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string postal_code = 4;
  string country = 5;           // ISO 3166-1 alpha-2
  optional EasyPostAddress easypost_address = 6; // populated after EasyPost verification
}

message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message Pagination {
  int32 page_size = 1;
  string page_token = 2;
}

message ErrorDetails {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

// Coordinate is a WGS-84 geographic position (longitude/latitude decimal degrees).
message Coordinate {
  double latitude  = 1;
  double longitude = 2;
}
