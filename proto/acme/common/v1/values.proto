// Shared value objects across all bounded contexts
syntax = "proto3";

package acme.common.v1;

import "google/protobuf/timestamp.proto";

message Money {
  string currency = 1;   // ISO 4217 currency code (USD, EUR, JPY, etc.)
  int64 units = 2;       // Amount in minor units (ISO 4217 exponent)
}

// EasyPostAddress holds the EasyPost-specific fields populated after address verification.
// The id is used downstream to create EasyPost Shipments without re-verifying.
message EasyPostAddress {
  string id = 1;        // EasyPost address ID
  string street1 = 2;
  string street2 = 3;
  string city = 4;
  string state = 5;
  string zip = 6;
  string country = 7;
  optional bool residential = 8; // affects carrier rate selection
  optional Coordinate coordinate = 9; // lat/lng from EasyPost verification; required by get_location_events
  string timezone = 10;              // IANA tz identifier from verifications.delivery.details.time_zone (e.g. "America/New_York")
}

message Address {
  optional EasyPostAddress easypost = 7; // populated after EasyPost verification
}

message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message Pagination {
  int32 page_size = 1;
  string page_token = 2;
}

message ErrorDetails {
  string code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

// Coordinate is a WGS-84 geographic position (longitude/latitude decimal degrees).
message Coordinate {
  double latitude  = 1;
  double longitude = 2;
}
