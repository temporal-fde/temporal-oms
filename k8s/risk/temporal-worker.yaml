# Risk Worker using Temporal Worker Controller
apiVersion: workload.temporal.io/v1
kind: TemporalWorker
metadata:
  name: risk-worker
  namespace: temporal-oms
  labels:
    app: risk-worker
    component: worker
    temporal-namespace: risk
spec:
  # Temporal connection
  temporalNamespace: risk
  temporalAddress: temporal-frontend.temporal.svc.cluster.local:7233

  # Task queue
  taskQueue: risk

  # Worker Versioning
  buildId: "1.0.0"
  useBuildIdForVersioning: true

  # Worker configuration
  workerConfig:
    maxConcurrentActivityExecutions: 50
    maxConcurrentWorkflowTaskExecutions: 50
    maxConcurrentLocalActivityExecutions: 50
    maxConcurrentWorkflowTaskPollers: 3
    maxConcurrentActivityTaskPollers: 3

  # Pod template
  template:
    metadata:
      labels:
        app: risk-worker
        component: worker
        temporal-namespace: risk
        version: "1.0.0"
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: worker
        image: temporal-oms/risk-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: TEMPORAL_NAMESPACE
          value: "risk"
        - name: TEMPORAL_TASK_QUEUE
          value: "risk"
        - name: BUILD_ID
          value: "1.0.0"
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        volumeMounts:
        - name: temporal-secrets
          mountPath: /etc/config/secrets/temporal
          readOnly: true
        - name: idp-secrets
          mountPath: /etc/config/secrets/idp
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: temporal-secrets
        secret:
          secretName: temporal-secrets
          defaultMode: 0400
      - name: idp-secrets
        secret:
          secretName: idp-secrets
          defaultMode: 0400

  # Scaling
  replicas: 2
