apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-api
  namespace: temporal-oms-apps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: localhost
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: apps-api
            port:
              number: 80
  - host: api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: apps-api
            port:
              number: 80
