ingressClass:
  enabled: true
  isDefaultClass: true

service:
  type: LoadBalancer

ports:
  web:
    port: 80
    exposedPort: 80
    protocol: TCP

  websecure:
    port: 443
    exposedPort: 443
    protocol: TCP

providers:
  kubernetesIngress:
    publishedService:
      enabled: true

logs:
  general:
    level: INFO
