apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - configmap

patches:
  # Local Temporal doesn't use API keys — remove the temporal-secret volume mount entirely
  - target:
      kind: Deployment
      name: apps-api
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
  - target:
      kind: Deployment
      name: apps-worker
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
  - target:
      kind: Deployment
      name: processing-api
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
