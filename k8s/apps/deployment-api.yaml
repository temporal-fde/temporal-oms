apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps-api
  namespace: temporal-oms-apps
  labels:
    app: apps-api
    component: api
    namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apps-api
  template:
    metadata:
      labels:
        app: apps-api
        component: api
        namespace: apps
      annotations:
        # OpenTelemetry auto-instrumentation
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: api
        image: temporal-oms/apps-api:latest
        imagePullPolicy: Never  # For local Minikube builds
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: MANAGEMENT_SERVER_PORT
          value: "9090"
        - name: BUILD_ID
          value: "1.0.0"
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 9090
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: temporal-secrets
          mountPath: /etc/config/secrets/temporal
          readOnly: true
        - name: idp-secrets
          mountPath: /etc/config/secrets/idp
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: temporal-secrets
        secret:
          secretName: temporal-secrets
          defaultMode: 0400
      - name: idp-secrets
        secret:
          secretName: idp-secrets
          defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: apps-api
  namespace: temporal-oms-apps
  labels:
    app: apps-api
spec:
  type: NodePort  # For Minikube access
  selector:
    app: apps-api
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
