apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: temporal-oms
  labels:
    app: web
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        component: frontend
    spec:
      containers:
      - name: web
        image: temporal-oms/web:latest
        imagePullPolicy: Never  # For local Minikube builds
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: ORIGIN
          value: "http://localhost:3000"
        # API backend URL (proxy to apps-api service)
        - name: API_BASE_URL
          value: "http://apps-api.temporal-oms.svc.cluster.local"
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: temporal-secrets
          mountPath: /etc/config/secrets/temporal
          readOnly: true
        - name: idp-secrets
          mountPath: /etc/config/secrets/idp
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: temporal-secrets
        secret:
          secretName: temporal-secrets
          defaultMode: 0400
      - name: idp-secrets
        secret:
          secretName: idp-secrets
          defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: temporal-oms
  labels:
    app: web
spec:
  type: NodePort  # For Minikube access
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
