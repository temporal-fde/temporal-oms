apiVersion: temporal.io/v1alpha1
kind: TemporalWorkerDeployment
metadata:
  name: processing-workers
  namespace: temporal-oms-processing
spec:
  replicas: 1
  rollout:
    strategy: Progressive
    steps:
      - rampPercentage: 10
        pauseDuration: 5m
      - rampPercentage: 50
        pauseDuration: 10m
  template:
    metadata:
      labels:
        app: processing-worker
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: worker
        image: temporal-oms/processing-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9092
          name: management
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        volumeMounts:
        - name: temporal-config
          mountPath: /etc/config/temporal
          readOnly: true
        - name: temporal-secret
          mountPath: /etc/config/temporal-secret
          readOnly: true
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      volumes:
      - name: temporal-config
        configMap:
          name: temporal-processing-config
          defaultMode: 0444
      - name: temporal-secret
        secret:
          secretName: temporal-processing-api-key
          defaultMode: 0444
