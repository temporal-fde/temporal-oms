# Processing Worker using Temporal Worker Controller
apiVersion: workload.temporal.io/v1
kind: TemporalWorker
metadata:
  name: processing-worker
  namespace: temporal-oms-processing
  labels:
    app: processing-worker
    component: worker
    temporal-namespace: processing
spec:
  # Temporal connection
  temporalNamespace: processing
  temporalAddress: temporal-frontend.temporal.svc.cluster.local:7233

  # Task queue
  taskQueue: processing

  # Worker Versioning
  buildId: "1.0.0"
  useBuildIdForVersioning: true

  # Worker configuration
  workerConfig:
    maxConcurrentActivityExecutions: 100
    maxConcurrentWorkflowTaskExecutions: 50
    maxConcurrentLocalActivityExecutions: 100
    maxConcurrentWorkflowTaskPollers: 5
    maxConcurrentActivityTaskPollers: 5

  # Pod template
  template:
    metadata:
      labels:
        app: processing-worker
        component: worker
        temporal-namespace: processing
        version: "1.0.0"
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: worker
        image: temporal-oms/processing-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: TEMPORAL_NAMESPACE
          value: "processing"
        - name: TEMPORAL_TASK_QUEUE
          value: "processing"
        - name: BUILD_ID
          value: "1.0.0"
        - name: SECRETS_DIR
          value: /etc/config/secrets/acme
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        volumeMounts:
        - name: temporal-secrets
          mountPath: /etc/config/secrets/temporal
          readOnly: true
        - name: idp-secrets
          mountPath: /etc/config/secrets/idp
          readOnly: true
        - name: acme-processing-secrets
          mountPath: /etc/config/secrets/acme
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      volumes:
      - name: temporal-secrets
        secret:
          secretName: temporal-secrets
          defaultMode: 0400
      - name: idp-secrets
        secret:
          secretName: idp-secrets
          defaultMode: 0400
      - name: acme-processing-secrets
        secret:
          secretName: acme-processing-secret
          defaultMode: 0400

  # Scaling
  replicas: 2
