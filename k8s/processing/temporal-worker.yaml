# Processing Worker using Temporal Worker Controller
apiVersion: workload.temporal.io/v1
kind: TemporalWorker
metadata:
  name: processing-worker
  namespace: temporal-oms
  labels:
    app: processing-worker
    component: worker
    temporal-namespace: processing
spec:
  # Temporal connection
  temporalNamespace: processing
  temporalAddress: temporal-frontend.temporal.svc.cluster.local:7233

  # Task queue
  taskQueue: processing

  # Worker Versioning
  buildId: "1.0.0"
  useBuildIdForVersioning: true

  # Worker configuration
  workerConfig:
    maxConcurrentActivityExecutions: 100
    maxConcurrentWorkflowTaskExecutions: 50
    maxConcurrentLocalActivityExecutions: 100
    maxConcurrentWorkflowTaskPollers: 5
    maxConcurrentActivityTaskPollers: 5

  # Pod template
  template:
    metadata:
      labels:
        app: processing-worker
        component: worker
        temporal-namespace: processing
        version: "1.0.0"
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: worker
        image: temporal-oms/processing-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: TEMPORAL_NAMESPACE
          value: "processing"
        - name: TEMPORAL_TASK_QUEUE
          value: "processing"
        - name: BUILD_ID
          value: "1.0.0"
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

  # Scaling
  replicas: 2
