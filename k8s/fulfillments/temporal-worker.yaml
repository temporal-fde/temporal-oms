# Fulfillments Worker using Temporal Worker Controller (Python AI Agent)
apiVersion: workload.temporal.io/v1
kind: TemporalWorker
metadata:
  name: fulfillments-worker
  namespace: temporal-oms
  labels:
    app: fulfillments-worker
    component: worker
    temporal-namespace: fulfillments
    language: python
spec:
  # Temporal connection
  temporalNamespace: fulfillments
  temporalAddress: temporal-frontend.temporal.svc.cluster.local:7233

  # Task queue
  taskQueue: fulfillments

  # Worker Versioning
  buildId: "1.0.0"
  useBuildIdForVersioning: true

  # Worker configuration
  workerConfig:
    maxConcurrentActivityExecutions: 20  # Lower for LLM rate limits
    maxConcurrentWorkflowTaskExecutions: 50
    maxConcurrentLocalActivityExecutions: 10
    maxConcurrentWorkflowTaskPollers: 3
    maxConcurrentActivityTaskPollers: 3

  # Pod template
  template:
    metadata:
      labels:
        app: fulfillments-worker
        component: worker
        temporal-namespace: fulfillments
        language: python
        version: "1.0.0"
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
      - name: worker
        image: temporal-oms/fulfillments-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: TEMPORAL_NAMESPACE
          value: "fulfillments"
        - name: TEMPORAL_TASK_QUEUE
          value: "fulfillments"
        - name: BUILD_ID
          value: "1.0.0"
        # Python-specific
        - name: PYTHONUNBUFFERED
          value: "1"
        envFrom:
        - configMapRef:
            name: temporal-oms-config
        - secretRef:
            name: temporal-oms-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

  # Scaling
  replicas: 2
