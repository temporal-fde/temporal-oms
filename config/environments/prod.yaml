# Production environment (Temporal Cloud)
temporal:
  address: your-namespace.tmprl.cloud:7233
  namespace: prod
  tls:
    enabled: true
    certPath: /etc/temporal/certs/client.pem
    keyPath: /etc/temporal/certs/client.key

api:
  host: 0.0.0.0
  port: 8080
  apiKeys:
    commerce-app: "${COMMERCE_API_KEY}"
    payments-app: "${PAYMENTS_API_KEY}"

database:
  host: "${DB_HOST}"
  port: 5432
  database: temporal_oms_prod
  username: "${DB_USER}"
  password: "${DB_PASSWORD}"
  ssl: true

stripe:
  apiKey: "${STRIPE_API_KEY}"
  webhookSecret: "${STRIPE_WEBHOOK_SECRET}"

kafka:
  brokers:
    - "${KAFKA_BROKER_1}"
    - "${KAFKA_BROKER_2}"
    - "${KAFKA_BROKER_3}"
  topic: order-fulfillment
  ssl: true

logging:
  level: warn
  format: json

external:
  pims:
    baseUrl: "${PIMS_BASE_URL}"
    rateLimit: 1000
  commerce:
    baseUrl: "${COMMERCE_BASE_URL}"
    rateLimit: 150
  payments:
    baseUrl: "${PAYMENTS_BASE_URL}"

observability:
  datadog:
    enabled: true
    apiKey: "${DD_API_KEY}"
    service: temporal-oms
    env: prod
