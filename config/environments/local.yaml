# Local minikube development environment
temporal:
  address: temporal-frontend.temporal.svc.cluster.local:7233

api:
  host: 0.0.0.0
  port: 8080
  apiKeys:
    commerce-app: "dev-commerce-key-12345"
    payments-app: "dev-payments-key-67890"

database:
  host: postgres.default.svc.cluster.local
  port: 5432
  database: temporal_oms
  username: postgres
  password: postgres

stripe:
  apiKey: "sk_test_PLACEHOLDER"
  webhookSecret: "whsec_PLACEHOLDER"

kafka:
  brokers:
    - kafka.default.svc.cluster.local:9092
  topic: order-fulfillment

logging:
  level: debug
  format: json

external:
  pims:
    baseUrl: http://pims-mock.default.svc.cluster.local:8081
    rateLimit: 1000
  commerce:
    baseUrl: http://commerce-mock.default.svc.cluster.local:8082
    rateLimit: 150
  payments:
    baseUrl: http://payments-mock.default.svc.cluster.local:8083
