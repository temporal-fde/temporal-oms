# Development environment (Temporal Cloud)
temporal:
  address: your-namespace.tmprl.cloud:7233
  namespace: dev
  tls:
    enabled: true
    certPath: /etc/temporal/certs/client.pem
    keyPath: /etc/temporal/certs/client.key

api:
  host: 0.0.0.0
  port: 8080
  apiKeys:
    commerce-app: "${COMMERCE_API_KEY}"
    payments-app: "${PAYMENTS_API_KEY}"

database:
  host: "${DB_HOST}"
  port: 5432
  database: temporal_oms_dev
  username: "${DB_USER}"
  password: "${DB_PASSWORD}"

stripe:
  apiKey: "${STRIPE_API_KEY}"
  webhookSecret: "${STRIPE_WEBHOOK_SECRET}"

kafka:
  brokers:
    - "${KAFKA_BROKER}"
  topic: order-fulfillment

logging:
  level: info
  format: json

external:
  pims:
    baseUrl: "${PIMS_BASE_URL}"
    rateLimit: 1000
  commerce:
    baseUrl: "${COMMERCE_BASE_URL}"
    rateLimit: 150
  payments:
    baseUrl: "${PAYMENTS_BASE_URL}"
