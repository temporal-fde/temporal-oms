# Temporal configuration
namespaces:
  apps:
    taskQueue: apps
    description: "Application orchestration namespace"
  processing:
    taskQueue: processing
    description: "Order processing namespace"
  risk:
    taskQueue: risk
    description: "Fraud detection and risk management namespace"
  fulfillments:
    taskQueue: fulfillments
    description: "Order fulfillment namespace with AI agent"

# Nexus services configuration
nexus:
  services:
    - name: OrderService
      namespace: processing
      description: "Order processing operations"
    - name: RiskService
      namespace: risk
      description: "Fraud detection operations"
    - name: FulfillmentService
      namespace: fulfillments
      description: "Fulfillment operations"

# Default settings
defaults:
  workflowExecutionTimeout: 24h
  workflowRunTimeout: 24h
  workflowTaskTimeout: 10s
  activityStartToCloseTimeout: 5m
  activityScheduleToCloseTimeout: 10m
