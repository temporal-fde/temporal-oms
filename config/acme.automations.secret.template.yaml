temporal:
  connection:
    # Temporal Cloud API key for the acme-automations-service-account.
    # This account is used by the Temporal Worker Controller's TemporalConnection CRD
    # to register worker build-ids and manage traffic ramp via the Worker Deployment API.
    # It requires Developer role or higher — a standard worker service account is insufficient.
    #
    # Get from: Temporal Cloud → Settings → Identities → acme-automations-service-account → API Keys
    api-key: "<TEMPORAL CLOUD API KEY>"
