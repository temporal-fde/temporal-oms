version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: java_package_prefix
      value: com.acme.proto
    - file_option: java_multiple_files
      value: true
plugins:
  # Java generation
  - remote: buf.build/protocolbuffers/java
    out: java/generated/src/main/java

  # Python generation
  - remote: buf.build/protocolbuffers/python
    out: python/generated

  # Python type stubs
  - remote: buf.build/protocolbuffers/pyi
    out: python/generated

  # Generate Pydantic models from .proto via protobuf-to-pydantic plugin
  # Binary lives in the python/ uv venv — path is relative to repo root
  - local: python/.venv/bin/protoc-gen-protobuf-to-pydantic
    out: python/generated/pydantic

  # TypeScript generation
  - remote: buf.build/bufbuild/es:v2.10.2
    out: web/src/lib/generated
