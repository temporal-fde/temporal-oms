spring.config.import: classpath:acme.apps.yaml,file:/etc/config/temporal/temporal-config.yaml,file:/etc/config/temporal-secret/temporal-secret.yaml
spring.application.name: apps-api
spring.temporal.start-workers: false

management.server.port: 9090

server:
  port: 8080

