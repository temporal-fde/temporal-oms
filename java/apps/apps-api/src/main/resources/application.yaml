spring.config.import: classpath:acme.apps.yaml
spring.profiles.default: local
spring.application.name: apps-api
spring.temporal.start-workers: false

management.server.port: 9091

server.port: 8080

easypost:
  api-key: ${EASYPOST_API_KEY}

# Swagger/OpenAPI Configuration (MANDATORY per stack-api-rest)
springdoc:
  api-docs:
    path: /v3/api-docs
#  swagger-ui:
#    path: /docs  # Swagger UI at /docs
#    operationsSorter: method
#    tagsSorter: alpha
  show-actuator: false

