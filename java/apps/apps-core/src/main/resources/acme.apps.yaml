spring.config.import: classpath:acme.oms.yaml
spring.temporal:
  namespace: ${TEMPORAL_NAMESPACE:}
  connection:

    # Connection settings
    target: ${TEMPORAL_ADDRESS:}

    # API Key for Temporal Cloud
    api-key: ${TEMPORAL_API_KEY:}
  workers:
    - task-queue: apps
      workflow-classes:
        - com.acme.apps.workflows.OrderImpl
      activity-beans:
        - options-activities
