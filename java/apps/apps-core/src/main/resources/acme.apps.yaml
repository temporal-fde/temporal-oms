spring.config.import: classpath:acme.oms.yaml
spring.temporal:
  namespace: ${TEMPORAL_APPS_NAMESPACE:apps}
  connection:
    target: ${TEMPORAL_APPS_ADDRESS:localhost:7233}
    api-key: ${TEMPORAL_APPS_API_KEY:}
  workers:
    - task-queue: apps
      workflow-classes:
        - com.acme.apps.workflows.OrderImpl
      activity-beans:
        - options-activities
      deployment-properties:
        use-versioning: true
        default-versioning-behavior: PINNED
        deployment-name: ${TEMPORAL_DEPLOYMENT_NAME:apps}
        build-id: ${TEMPORAL_WORKER_BUILD_ID:local}
    - task-queue: integrations
      workflow-classes:
        - com.acme.apps.workflows.IntegrationsImpl
      activity-beans:
        - integrations-setup-activities
      nexus-service-beans:
        - commerce-app-service
        - pims-service
        - payments-service
        - inventory-service
      rate-limits:
        max-task-queue-activities-per-second: 5
