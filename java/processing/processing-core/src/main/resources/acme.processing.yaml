spring.temporal:
    connection:
      # Connection settings
      target: ${TEMPORAL_ADDRESS:localhost:7233}

      # API Key for Temporal Cloud
      api-key: ${TEMPORAL_API_KEY:}

    namespace: ${TEMPORAL_NAMESPACE:}
    workers:
      - task-queue: processing
        workflow-classes:
          - com.acme.processing.workflows.OrderImpl
        activity-beans:
          - enrichment-activities
          - fulfillment-activities
        nexus-service-beans:
          - processing-service
        deployment-properties:
          use-versioning: true
          default-versioning-behavior: PINNED
          deployment-name: processing
          build-id: 1.0.0
      - task-queue: commerce-app
        activity-beans:
          - commerce-app-activities
        rate-limits:
          max-task-queue-activities-per-second: 150
      - task-queue: support
        workflow-classes:
          - com.acme.processing.workflows.SupportTeamImpl
        activity-beans:
          - support-activities
#    workers-auto-discovery:
#      # this is a workaround for the bug here: https://github.com/temporalio/sdk-java/pull/2789
#      packages: com.acme.processing.services