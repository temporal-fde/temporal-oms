<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 40px;
      width: 600px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f4f8;
    }

    .icon {
      background: #4f46e5;
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .card-header h1 { font-size: 22px; color: #1e293b; }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .field .value {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: #1e293b;
      font-weight: 500;
    }

    .field .value.order-id {
      font-family: monospace;
      font-size: 16px;
      color: #4f46e5;
      letter-spacing: 0.05em;
    }

    /* JSON block styling */
    .json-block {
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }

    .json-block pre {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre;
      color: #e2e8f0;
    }

    /* Syntax highlighting */
    .json-key    { color: #7dd3fc; }  /* blue   - keys   */
    .json-string { color: #86efac; }  /* green  - strings */
    .json-number { color: #fda4af; }  /* pink   - numbers */
    .json-bool   { color: #f9a8d4; }  /* purple - booleans */
    .json-null   { color: #94a3b8; }  /* gray   - null */

    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #16a34a;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="icon">📦</div>
    <h1>Order Details</h1>
  </div>

  <div class="field">
    <label>Order ID</label>
    <div class="value order-id">%s</div>
  </div>

  <div class="field">
    <label>Order Data</label>
    <div class="json-block">
      <pre id="json-output"></pre>
    </div>
    <span class="badge">✓ Retrieved Successfully</span>
  </div>
</div>

<script>
  const raw = `%s`;

  function highlight(json) {
    return json.replace(
            /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,
            match => {
              if (/^"/.test(match)) {
                return /:$/.test(match)
                        ? `<span class="json-key">${match}</span>`
                        : `<span class="json-string">${match}</span>`;
              } else if (/true|false/.test(match)) {
                return `<span class="json-bool">${match}</span>`;
              } else if (/null/.test(match)) {
                return `<span class="json-null">${match}</span>`;
              }
              return `<span class="json-number">${match}</span>`;
            }
    );
  }

  try {
    const parsed = JSON.parse(raw);
    const pretty = JSON.stringify(parsed, null, 2);
    document.getElementById('json-output').innerHTML = highlight(pretty);
  } catch (e) {
    document.getElementById('json-output').textContent = raw;
  }
</script>
</body>
</html>
